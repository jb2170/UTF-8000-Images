<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" id="svg1" width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
   <defs id="defs1">
      <style>
         .utf-8000-bits, .utf-8000-byte {
            /* font-family: monospace; */
            font-family: "Courier New", Courier, monospace;
            font-size: 12pt;
         }

         .utf-8000-continuation-prefix-bits {
            font-weight: bold;
            fill: cyan;
         }

         .utf-8000-y-bits {
            fill: orange;
         }

         .utf-8000-start-bits {
            font-weight: bold;
            fill: magenta;
         }

         .utf-8000-mandatory-content-bits {
            font-weight: bold;
            fill: lime;
         }

         .utf-8000-optional-content-bits {
            fill: lime;
         }
      </style>


      <mask id="side-transparency" width="400" x="-200" height="320" y="-160">
         <linearGradient id="edge-fade" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="  0%" stop-color="black" />
            <stop offset=" 12%" stop-color="white" />
            <stop offset=" 88%" stop-color="white" />
            <stop offset="100%" stop-color="black" />
         </linearGradient>
         <rect width="400" x="-200" height="320" y="-160" fill="url(#edge-fade)" />
      </mask>

      <rect id="masks-highlight" x="-100" y="-15" width="200" height="20" fill="yellow" />

      <g id="masks" class="utf-8000-bits">
         <g transform="translate(0   0)">
            <text text-anchor="middle" x="-50" text-decoration="line-through"><tspan class="utf-8000-continuation-prefix-bits">00</tspan><tspan>000000</tspan><tspan class="utf-8000-mandatory-content-bits"></tspan></text>
            <text text-anchor="middle" x="+50"><tspan class="utf-8000-continuation-prefix-bits">00</tspan><tspan class="utf-8000-mandatory-content-bits">11111</tspan><tspan>0</tspan></text>
         </g>
         <g transform="translate(0  25)">
            <text text-anchor="middle" x="-50"><tspan class="utf-8000-continuation-prefix-bits">00</tspan><tspan>00000</tspan><tspan class="utf-8000-mandatory-content-bits">1</tspan></text>
            <text text-anchor="middle" x="+50"><tspan class="utf-8000-continuation-prefix-bits">00</tspan><tspan class="utf-8000-mandatory-content-bits">1111</tspan><tspan>00</tspan></text>
         </g>
         <g transform="translate(0  50)">
            <text text-anchor="middle" x="-50"><tspan class="utf-8000-continuation-prefix-bits">00</tspan><tspan>0000</tspan><tspan class="utf-8000-mandatory-content-bits">11</tspan></text>
            <text text-anchor="middle" x="+50"><tspan class="utf-8000-continuation-prefix-bits">00</tspan><tspan class="utf-8000-mandatory-content-bits">111</tspan><tspan>000</tspan></text>
         </g>
         <g transform="translate(0  75)">
            <text text-anchor="middle" x="-50"><tspan class="utf-8000-continuation-prefix-bits">00</tspan><tspan>000</tspan><tspan class="utf-8000-mandatory-content-bits">111</tspan></text>
            <text text-anchor="middle" x="+50"><tspan class="utf-8000-continuation-prefix-bits">00</tspan><tspan class="utf-8000-mandatory-content-bits">11</tspan><tspan>0000</tspan></text>
         </g>
         <g transform="translate(0 100)">
            <text text-anchor="middle" x="-50"><tspan class="utf-8000-continuation-prefix-bits">00</tspan><tspan>00</tspan><tspan class="utf-8000-mandatory-content-bits">1111</tspan></text>
            <text text-anchor="middle" x="+50"><tspan class="utf-8000-continuation-prefix-bits">00</tspan><tspan class="utf-8000-mandatory-content-bits">1</tspan><tspan>00000</tspan></text>
         </g>
         <g transform="translate(0 125)" height="200">
            <text text-anchor="middle" x="-50"><tspan class="utf-8000-continuation-prefix-bits">00</tspan><tspan>0</tspan><tspan class="utf-8000-mandatory-content-bits">11111</tspan></text>
            <text text-anchor="middle" x="+50" text-decoration="line-through"><tspan class="utf-8000-continuation-prefix-bits">00</tspan><tspan class="utf-8000-mandatory-content-bits"></tspan><tspan>000000</tspan></text>
         </g>
      </g>

   </defs>

   <g transform="translate(220 160)">
      <rect stroke="black" stroke-width="1px" fill="none" width="400" x="-200" height="280" y="-140" />

      <g mask="url(#side-transparency)">
         <g transform="translate(0 0)">
            <text text-anchor="middle" dominant-baseline="central">
               <tspan x="-200" class="utf-8000-byte utf-8000-continuation-byte">
                  <tspan class="utf-8000-continuation-prefix-bits">10</tspan><tspan class="utf-8000-start-bits">111111</tspan>
               </tspan>
               <tspan x="-100" class="utf-8000-byte utf-8000-continuation-byte">
                  <tspan class="utf-8000-continuation-prefix-bits">10</tspan><tspan class="utf-8000-start-bits">111111</tspan>
               </tspan>
               <tspan x="0" class="utf-8000-byte utf-8000-continuation-byte">
                  <tspan class="utf-8000-continuation-prefix-bits">10</tspan><tspan class="utf-8000-start-bits">110</tspan><tspan class="utf-8000-mandatory-content-bits">xxx</tspan>
               </tspan>
               <tspan x="+100" class="utf-8000-byte utf-8000-continuation-byte">
                  <tspan class="utf-8000-continuation-prefix-bits">10</tspan><tspan class="utf-8000-mandatory-content-bits">xx</tspan><tspan class="utf-8000-optional-content-bits">xxxx</tspan>
               </tspan>
               <tspan x="+200" class="utf-8000-byte utf-8000-continuation-byte">
                  <tspan class="utf-8000-continuation-prefix-bits">10</tspan><tspan class="utf-8000-optional-content-bits">xxxxxx</tspan>
               </tspan>
               <tspan x="+300" class="utf-8000-byte utf-8000-continuation-byte">
                  <tspan class="utf-8000-continuation-prefix-bits">10</tspan><tspan class="utf-8000-optional-content-bits">xxxxxx</tspan>
               </tspan>
               <tspan x="+400" class="utf-8000-byte utf-8000-continuation-byte">
                  <tspan class="utf-8000-continuation-prefix-bits">10</tspan><tspan class="utf-8000-optional-content-bits">xxxxxx</tspan>
               </tspan>
            </text>

            <polyline id="line-continuation-bytes" points="-45,0 +545,0" fill="none" stroke-width="4" stroke="cyan" transform="translate(-200 -25)" />

            <polyline id="line-start-bytes" points="-45,0 +245,0 +245,10" fill="none" stroke-width="4" stroke="magenta" transform="translate(-200 -75)" />

            <polyline id="line-mandatory-content-bytes" points="-45,-10 -45,0 +145,0 +145,-10" fill="none" stroke-width="4" stroke="lime" transform="translate(0 +25)" />

            <polyline id="line-optional-content-bytes" points="-45,-10 -45,0 +245,0" fill="none" stroke-width="4" stroke="lime" transform="translate(0 +75)" />
         </g>
      </g>
   </g>

   <text class="utf-8000-bits" transform="translate(510 45)">
      <tspan x="0" dy="15">Final</tspan>
      <tspan x="0" dy="15">Start</tspan>
      <tspan x="0" dy="15">Byte</tspan>
      <tspan x="0" dy="15">Mask</tspan>
   </text>

   <text class="utf-8000-bits" transform="translate(610 45)">
      <tspan x="0" dy="15">First</tspan>
      <tspan x="0" dy="15">Non-Start</tspan>
      <tspan x="0" dy="15">Byte</tspan>
      <tspan x="0" dy="15">Mask</tspan>
   </text>

   <use href="#masks-highlight" transform="translate(600 215)" />
   <use href="#masks"           transform="translate(600 140)" />

</svg>
